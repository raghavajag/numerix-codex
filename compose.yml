services:
  frontend:
    build:
      context: ./src/fe
      args:
        VITE_NUMERIX_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - api
      - manim-worker

  api:
    build:
      context: .
      target: api
    env_file:
      - .env
    environment:
      MANIM_WORKER_URL: http://manim-worker:8080
    ports:
      - "8000:8000"
    depends_on:
      - manim-worker

  manim-worker:
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      PUBLIC_MEDIA_BASE_URL: http://localhost:3000/published
    ports:
      - "8080:8080"
    volumes:
      - worker-media:/tmp/manim-worker

volumes:
  worker-media:
